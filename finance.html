<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceFlow — Controle Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--surface:#ffffff;--surface2:#f1f3f7;
  --border:#e8eaed;--text:#1a1d23;--muted:#6b7280;--light:#9ca3af;
  --blue:#2563eb;--purple:#7c3aed;--orange:#ea580c;--green:#16a34a;--red:#dc2626;--gray:#6b7280;
  --blue-bg:#eff6ff;--purple-bg:#f5f3ff;--orange-bg:#fff7ed;--green-bg:#f0fdf4;--red-bg:#fef2f2;--gray-bg:#f9fafb;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
.dark{
  --bg:#0f1117;--surface:#1a1d26;--surface2:#252836;
  --border:#2d3748;--text:#f0f4ff;--muted:#94a3b8;--light:#64748b;
  --blue-bg:#1e3a5f;--purple-bg:#2e1a5e;--orange-bg:#431c05;--green-bg:#052e16;--red-bg:#450a0a;--gray-bg:#1f2937;
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;font-size:14px}
.app{max-width:1100px;margin:0 auto;padding:24px 16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.brand{font-size:20px;font-weight:700;color:var(--blue);letter-spacing:-.5px}
.brand span{color:var(--text)}
.actions{display:flex;gap:8px}
.btn-icon{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:6px;transition:all .2s;font-family:'Inter',sans-serif}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:all .3s}
.card-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.card-value{font-size:26px;font-weight:700;letter-spacing:-1px;transition:all .4s}
.card-value.income{color:var(--green)}
.card-value.expense{color:var(--red)}
.card-sub{font-size:11px;color:var(--light);margin-top:4px}
.card-icon{font-size:22px;margin-bottom:12px}
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-bottom:24px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.panel-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:500;color:var(--muted)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color .2s,background .2s;width:100%}
input:focus,select:focus{border-color:var(--blue);background:var(--surface)}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.type-btn{padding:10px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--muted);background:var(--surface2);font-family:'Inter',sans-serif;border:none}
.type-btn.active.income-btn{background:var(--green);color:#fff}
.type-btn.active.expense-btn{background:var(--red);color:#fff}
.type-btn:not(.active):hover{background:var(--surface)}
.btn-add{width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:all .2s;letter-spacing:-.2px;font-family:'Inter',sans-serif}
.btn-add:hover{background:#1d4ed8;transform:translateY(-1px)}
.btn-add:active{transform:translateY(0)}
.chart-wrap{height:200px;display:flex;align-items:center;justify-content:center;position:relative}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filters-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-select{flex:1;min-width:120px}
.search-wrap{flex:2;min-width:160px;position:relative}
.search-wrap input{padding-left:32px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--light);font-size:13px;pointer-events:none}
.sort-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .2s;font-family:'Inter',sans-serif}
.sort-btn:hover{background:var(--surface);color:var(--text)}
.tx-list{display:flex;flex-direction:column;gap:8px;max-height:460px;overflow-y:auto;padding-right:2px}
.tx-list::-webkit-scrollbar{width:4px}
.tx-list::-webkit-scrollbar-track{background:transparent}
.tx-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tx-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid transparent;transition:all .25s;animation:slideIn .3s ease}
.tx-item:hover{border-color:var(--border);background:var(--surface)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{to{opacity:0;transform:translateX(20px)}}
.tx-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tx-amount{font-size:14px;font-weight:700;margin-left:auto;white-space:nowrap}
.tx-amount.income{color:var(--green)}
.tx-amount.expense{color:var(--red)}
.btn-remove{background:none;border:none;cursor:pointer;color:var(--light);font-size:18px;padding:4px 6px;border-radius:4px;transition:all .2s;margin-left:6px;line-height:1;font-family:'Inter',sans-serif}
.btn-remove:hover{color:var(--red);background:var(--red-bg)}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:10px}
.cat-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.no-chart{text-align:center;color:var(--muted);font-size:12px;padding:40px 0;display:none}
canvas{display:block}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--bg);padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:800px){
  .main-grid{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:500px){
  .cards-grid{grid-template-columns:1fr}
  .filters-row{flex-direction:column}
  .brand{font-size:16px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">Finance<span>Flow</span></div>
    <div class="actions">
      <button class="btn-icon" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="btn-icon" id="darkToggle" onclick="toggleDark()">◐ Modo Escuro</button>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card">
      <div class="card-icon">💰</div>
      <div class="card-label">Saldo Total</div>
      <div class="card-value" id="balanceVal">R$ 0,00</div>
      <div class="card-sub" id="txCount">0 transações</div>
    </div>
    <div class="card">
      <div class="card-icon">📈</div>
      <div class="card-label">Entradas</div>
      <div class="card-value income" id="incomeVal">R$ 0,00</div>
      <div class="card-sub" id="incomeCount">0 receitas</div>
    </div>
    <div class="card">
      <div class="card-icon">📉</div>
      <div class="card-label">Saídas</div>
      <div class="card-value expense" id="expenseVal">R$ 0,00</div>
      <div class="card-sub" id="expenseCount">0 despesas</div>
    </div>
  </div>

  <div class="main-grid">
    <div>
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-title">✚ Nova Transação</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>Tipo</label>
            <div class="type-toggle">
              <button class="type-btn income-btn active" id="incomeBtn" onclick="setType('income')">📈 Entrada</button>
              <button class="type-btn expense-btn" id="expenseBtn" onclick="setType('expense')">📉 Saída</button>
            </div>
          </div>
          <div class="form-group full">
            <label>Descrição</label>
            <input type="text" id="desc" placeholder="Ex: Salário, Aluguel, Netflix..." onkeydown="if(event.key==='Enter')addTransaction()">
          </div>
          <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" id="amount" placeholder="0,00" min="0" step="0.01" onkeydown="if(event.key==='Enter')addTransaction()">
          </div>
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="date">
          </div>
          <div class="form-group full">
            <label>Categoria</label>
            <select id="category">
              <option value="investimentos">💼 Investimentos</option>
              <option value="estudos">📚 Estudos</option>
              <option value="lazer">🎮 Lazer</option>
              <option value="alimentacao">🍽 Alimentação</option>
              <option value="contas">🏠 Contas Fixas</option>
              <option value="outros">📦 Outros</option>
            </select>
          </div>
        </div>
        <button class="btn-add" onclick="addTransaction()">Adicionar Transação</button>
      </div>

      <div class="panel">
        <div class="panel-title">📋 Transações</div>
        <div class="filters-row">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Buscar transação..." oninput="renderList()">
          </div>
          <select class="filter-select" id="filterCat" onchange="renderList()">
            <option value="">Todas categorias</option>
            <option value="investimentos">Investimentos</option>
            <option value="estudos">Estudos</option>
            <option value="lazer">Lazer</option>
            <option value="alimentacao">Alimentação</option>
            <option value="contas">Contas</option>
            <option value="outros">Outros</option>
          </select>
          <select class="filter-select" id="filterType" onchange="renderList()">
            <option value="">Tudo</option>
            <option value="income">Entradas</option>
            <option value="expense">Saídas</option>
          </select>
          <button class="sort-btn" onclick="toggleSort()" id="sortBtn">📅 Data ↓</button>
        </div>
        <div class="tx-list" id="txList"></div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="panel-title">📊 Distribuição por Categoria</div>
        <div class="chart-wrap">
          <canvas id="pieChart"></canvas>
          <div class="no-chart" id="noChart" style="display:block">Adicione transações para ver o gráfico</div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = {
  investimentos:{label:'Investimentos',icon:'💼',color:'#2563eb',bg:'#eff6ff',text:'#1d4ed8'},
  estudos:{label:'Estudos',icon:'📚',color:'#7c3aed',bg:'#f5f3ff',text:'#5b21b6'},
  lazer:{label:'Lazer',icon:'🎮',color:'#ea580c',bg:'#fff7ed',text:'#c2410c'},
  alimentacao:{label:'Alimentação',icon:'🍽',color:'#16a34a',bg:'#f0fdf4',text:'#15803d'},
  contas:{label:'Contas Fixas',icon:'🏠',color:'#dc2626',bg:'#fef2f2',text:'#b91c1c'},
  outros:{label:'Outros',icon:'📦',color:'#6b7280',bg:'#f9fafb',text:'#4b5563'}
};

let transactions = JSON.parse(localStorage.getItem('ff_transactions') || '[]');
let currentType = 'income';
let sortMode = 'date-desc';
let chart = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setType(t) {
  currentType = t;
  document.getElementById('incomeBtn').classList.toggle('active', t === 'income');
  document.getElementById('expenseBtn').classList.toggle('active', t === 'expense');
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function addTransaction() {
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value || getToday();
  const category = document.getElementById('category').value;
  if (!desc) { showToast('⚠️ Adicione uma descrição.'); return; }
  if (!amount || amount <= 0) { showToast('⚠️ Informe um valor válido.'); return; }
  const tx = { id: Date.now(), desc, amount, type: currentType, category, date };
  transactions.unshift(tx);
  save();
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('date').value = getToday();
  showToast(currentType === 'income' ? '✅ Entrada adicionada!' : '✅ Saída registrada!');
  renderAll();
}

function removeTransaction(id) {
  const el = document.getElementById('tx-' + id);
  if (el) {
    el.style.animation = 'fadeOut .3s ease forwards';
    setTimeout(() => {
      transactions = transactions.filter(t => t.id !== id);
      save();
      renderAll();
    }, 280);
  }
}

function save() {
  localStorage.setItem('ff_transactions', JSON.stringify(transactions));
}

function fmtBRL(v) {
  return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function animateValue(el, target) {
  const start = parseFloat(el.dataset.val || 0);
  el.dataset.val = target;
  const diff = target - start;
  const steps = 20;
  let i = 0;
  clearInterval(el._iv);
  el._iv = setInterval(() => {
    i++;
    const cur = start + (diff * (i / steps));
    el.textContent = fmtBRL(cur);
    if (i >= steps) { clearInterval(el._iv); el.textContent = fmtBRL(target); }
  }, 16);
}

function renderSummary() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = income - expense;
  const bEl = document.getElementById('balanceVal');
  animateValue(bEl, balance);
  bEl.style.color = balance >= 0 ? '#16a34a' : '#dc2626';
  animateValue(document.getElementById('incomeVal'), income);
  animateValue(document.getElementById('expenseVal'), expense);
  const inc = transactions.filter(t => t.type === 'income').length;
  const exp = transactions.filter(t => t.type === 'expense').length;
  document.getElementById('txCount').textContent = transactions.length + ' transação' + (transactions.length !== 1 ? 'ões' : '');
  document.getElementById('incomeCount').textContent = inc + ' receita' + (inc !== 1 ? 's' : '');
  document.getElementById('expenseCount').textContent = exp + ' despesa' + (exp !== 1 ? 's' : '');
}

function renderChart() {
  const catData = {};
  transactions.forEach(t => { if (!catData[t.category]) catData[t.category] = 0; catData[t.category] += t.amount; });
  const keys = Object.keys(catData);
  const noChart = document.getElementById('noChart');
  const canvas = document.getElementById('pieChart');
  if (keys.length === 0) {
    noChart.style.display = 'block';
    canvas.style.display = 'none';
    if (chart) { chart.destroy(); chart = null; }
    document.getElementById('legend').innerHTML = '';
    return;
  }
  noChart.style.display = 'none';
  canvas.style.display = 'block';
  const labels = keys.map(k => CATS[k]?.label || k);
  const data = keys.map(k => catData[k]);
  const colors = keys.map(k => CATS[k]?.color || '#888');
  if (chart) chart.destroy();
  chart = new Chart(canvas, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '70%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + fmtBRL(ctx.raw) + ' (' + ((ctx.raw / data.reduce((a, b) => a + b, 0)) * 100).toFixed(1) + '%)' } }
      }
    }
  });
  document.getElementById('legend').innerHTML = keys.map(k =>
    `<div class="legend-item"><div class="legend-dot" style="background:${CATS[k]?.color || '#888'}"></div><span>${CATS[k]?.label || k}</span></div>`
  ).join('');
}

function getFiltered() {
  const s = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filterCat').value;
  const type = document.getElementById('filterType').value;
  let list = [...transactions];
  if (s) list = list.filter(t => t.desc.toLowerCase().includes(s) || (CATS[t.category]?.label || '').toLowerCase().includes(s));
  if (cat) list = list.filter(t => t.category === cat);
  if (type) list = list.filter(t => t.type === type);
  if (sortMode === 'date-desc') list.sort((a, b) => b.date.localeCompare(a.date));
  else if (sortMode === 'date-asc') list.sort((a, b) => a.date.localeCompare(b.date));
  else if (sortMode === 'val-desc') list.sort((a, b) => b.amount - a.amount);
  else if (sortMode === 'val-asc') list.sort((a, b) => a.amount - b.amount);
  return list;
}

function toggleSort() {
  const modes = ['date-desc', 'date-asc', 'val-desc', 'val-asc'];
  const labels = ['📅 Data ↓', '📅 Data ↑', '💰 Valor ↓', '💰 Valor ↑'];
  const i = modes.indexOf(sortMode);
  sortMode = modes[(i + 1) % modes.length];
  document.getElementById('sortBtn').textContent = labels[(i + 1) % modes.length];
  renderList();
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById('txList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div>Nenhuma transação encontrada</div></div>`;
    return;
  }
  el.innerHTML = list.map(t => {
    const cat = CATS[t.category] || CATS.outros;
    const sign = t.type === 'income' ? '+' : '-';
    const dateStr = t.date ? new Date(t.date + 'T00:00:00').toLocaleDateString('pt-BR') : '';
    return `<div class="tx-item" id="tx-${t.id}">
      <div class="tx-icon" style="background:${cat.bg};color:${cat.text}">${cat.icon}</div>
      <div class="tx-info">
        <div class="tx-desc">${escapeHtml(t.desc)}</div>
        <div class="tx-meta">${dateStr} · <span class="cat-badge" style="background:${cat.bg};color:${cat.text}">${cat.label}</span></div>
      </div>
      <span class="tx-amount ${t.type}">${sign} ${fmtBRL(t.amount)}</span>
      <button class="btn-remove" onclick="removeTransaction(${t.id})" title="Remover transação">×</button>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderAll() {
  renderSummary();
  renderChart();
  renderList();
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const on = document.body.classList.contains('dark');
  document.getElementById('darkToggle').textContent = on ? '☀ Modo Claro' : '◐ Modo Escuro';
  localStorage.setItem('ff_dark', on ? '1' : '0');
}

function exportCSV() {
  if (!transactions.length) { showToast('⚠️ Nenhuma transação para exportar.'); return; }
  const hdr = 'Data,Descrição,Tipo,Categoria,Valor (R$)\n';
  const rows = transactions.map(t =>
    `${t.date},"${t.desc.replace(/"/g, '""')}",${t.type === 'income' ? 'Entrada' : 'Saída'},${CATS[t.category]?.label || t.category},${t.amount.toFixed(2)}`
  ).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + hdr + rows], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'financeflow_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  showToast('📥 CSV exportado com sucesso!');
}

if (localStorage.getItem('ff_dark') === '1') {
  document.body.classList.add('dark');
  document.getElementById('darkToggle').textContent = '☀ Modo Claro';
}
document.getElementById('date').value = getToday();
renderAll();
</script>
</body>
</html>
